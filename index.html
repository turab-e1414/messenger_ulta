    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
       * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    font-family: 'Poppins', sans-serif; 
}
        body { background: linear-gradient(45deg, #00dbde 0%, #fc00ff 100%); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
       .app-container {
    width: 100%;
    max-width: 420px;
    height: 92vh;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(15px); 
    -webkit-backdrop-filter: blur(15px);
    border-radius: 40px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
}
        .screen { padding: 30px; display: none; flex-direction: column; gap: 15px; height: 100%; background: white; }
        .active { display: flex; }
        h2 { text-align: center; color: var(--primary); font-size: 28px; font-weight: 800; }
        .input-group { position: relative; width: 100%; }
        input { width: 100%; padding: 14px 20px; border: 2px solid #eee; border-radius: 15px; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .eye-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #0084ff; font-size: 18px; }
        .btn-main {
    padding: 16px;
    background: linear-gradient(135deg, #0084ff 0%, #00c6ff 100%);
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    box-shadow: 0 10px 20px rgba(0, 132, 255, 0.2);
    transition: all 0.3s ease;
}
.btn-main:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 25px rgba(0, 132, 255, 0.3);
}
        .circle-img { 
        width: 100px !important; 
        height: 100px !important; 
        margin: 0 auto 15px !important; 
        display: block; 
    }
    .screen { 
        padding: 20px !important; 
        overflow-y: auto !important; 
    }
        #list-screen { padding: 0; }
       .list-header { 
    padding: 12px 18px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #f0f0f0;
    position: sticky;
    top: 0;
    z-index: 10;
}
        .chat-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px 20px;
    margin: 8px 15px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.chat-item:hover {
    transform: scale(1.03);
    background: #ffffff;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; }

        /* Chat Screen Styles */
        #chat-screen { padding: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 100; }
        #chat-screen.active { display: flex; }
        .messages-container { 
    flex: 1; 
    padding: 15px; 
    overflow-y: auto; 
    display: flex; 
    flex-direction: column; 
    gap: 6px; 
    background: #ffffff; 
}
    .msg { 
    max-width: 75%; 
    padding: 10px 16px; 
    border-radius: 22px; 
    font-size: 14.5px; 
    line-height: 1.4;
    word-wrap: break-word;
    margin-bottom: 2px;
}

.sent { 
    align-self: flex-end; 
    background: #0084ff; 
    color: white; 
    border-bottom-right-radius: 6px; 
}

.received { 
    align-self: flex-start; 
    background: #e4e6eb; 
    color: black; 
    border-bottom-left-radius: 6px; 
}
        
        .msg-time { font-size: 10px; margin-top: 4px; opacity: 0.8; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }
        .received .msg-time { color: #888; justify-content: flex-start; }
        
        .msg-reply-line { font-size: 11px; background: rgba(0,0,0,0.05); padding: 6px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid var(--primary); opacity: 0.9; }
        .sent .msg-reply-line { background: rgba(255,255,255,0.2); border-left-color: white; color: white; }

        .chat-img { max-width: 100%; border-radius: 10px; cursor: pointer; margin-top: 5px; }
        .reply-container { background: #f0f0f0; padding: 8px 15px; border-left: 4px solid var(--primary); display: none; justify-content: space-between; align-items: center; }
      .input-footer { 
    padding: 10px 15px; 
    display: flex; 
    gap: 12px; 
    background: white; 
    align-items: center;
    border-top: 1px solid #eee;
}

#msg-input { 
    background: #f0f2f5; 
    border: none; 
    flex: 1; 
    padding: 10px 20px; 
    border-radius: 25px; 
    outline: none; 
    font-size: 15px;
}
        .reaction-badge {
    position: absolute;
    bottom: -10px;
    right: 10px;
    background: white;
    border-radius: 12px;
    padding: 2px 6px;
    font-size: 14px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    border: 1px solid #eee;
}
.emoji-bar {
    display: flex;
    justify-content: space-around;
    padding: 5px;
    background: #f9f9f9;
    border-top: 1px solid #eee;
}
.emoji-btn {
    cursor: pointer;
    font-size: 20px;
    transition: transform 0.2s;
}
.emoji-btn:hover { transform: scale(1.3); }
#edit-screen input {
    margin-bottom: 10px;
}

audio {
    max-width: 100%;
    height: 40px;
    margin-top: 5px;
    border-radius: 20px;
}
.recording-active {
    color: #ff3b30 !important; 
    animation: pulse 1s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

<body>

<div class="app-container">
    <div id="register-screen" class="screen active">
        <h2>Create Account</h2>
        <div style="text-align: center;">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="reg-preview" class="circle-img" onclick="document.getElementById('reg-file').click()">
            <input type="file" id="reg-file" hidden onchange="previewImg('reg-file', 'reg-preview')">
        </div>
        <input type="text" id="reg-id" placeholder="Phone Number">
        <input type="text" id="reg-user" placeholder="Username">
        <input type="text" id="reg-name" placeholder="Full Name">
        <div class="input-group">
            <input type="password" id="reg-pass" placeholder="Password">
            <i class="fa fa-eye-slash eye-icon" onclick="togglePass('reg-pass', this)"></i>
        </div>
        <button class="btn-main" onclick="handleRegister()">Sign Up</button>
        <p style="text-align:center; cursor:pointer;" onclick="showScreen('login-screen')">Already have an account? Log In</p>
    </div>

    <div id="login-screen" class="screen">
        <h2>Login</h2>
        <input type="text" id="log-id" placeholder="Phone Number">
        <div class="input-group">
            <input type="password" id="log-pass" placeholder="Password">
            <i class="fa fa-eye-slash eye-icon" onclick="togglePass('log-pass', this)"></i>
        </div>
        <button class="btn-main" onclick="handleLogin()">Log In</button>
        <p style="text-align:center; cursor:pointer;" onclick="showScreen('register-screen')">Create Account</p>
    </div>

    <div id="list-screen" class="screen">
        <div class="list-header">
            <h1 style="font-size: 22px;">Chats</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button onclick="handleLogout()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">Logout</button>
                <img id="my-pic" src="" style="width:40px; height:40px; border-radius:50%;" onclick="showEditProfile()">
            </div>
        </div>
        <div style="padding: 10px 20px;"><input type="text" id="search-input" placeholder="Search..." oninput="searchUser()"></div>
        <div id="list-container" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="edit-screen" class="screen">
        <h2>Edit Profile</h2>
        <div style="text-align: center;">
            <img id="edit-preview" class="circle-img" onclick="document.getElementById('edit-file').click()">
            <input type="file" id="edit-file" hidden onchange="previewImg('edit-file', 'edit-preview')">
        </div>
        <input type="text" id="edit-name" placeholder="New Full Name">
        <button class="btn-main" onclick="saveProfile()">Save</button>
        <button class="btn-main" style="background:#ccc;" onclick="showScreen('list-screen')">Cancel</button>
        <input type="password" id="edit-pass" placeholder="New Password">
    </div>

    <div id="chat-screen" class="screen">
        <div class="list-header">
            <i class="fa fa-chevron-left" onclick="showScreen('list-screen')" style="cursor:pointer; color: #0084ff;"></i>
            <h4 id="chat-partner-name">User</h4>
            <img id="chat-partner-pic" src="" style="width:35px; height:35px; border-radius:50%;">
        </div>
        <div class="messages-container" id="chat-box"></div>
        <div class="emoji-bar">
            <span class="emoji-btn" onclick="addEmoji('❤️')">❤️</span>
            <span class="emoji-btn" onclick="addEmoji('😘')">😘</span>
            <span class="emoji-btn" onclick="addEmoji('😂')">😂</span>
            <span class="emoji-btn" onclick="addEmoji('👍')">👍</span>
            <span class="emoji-btn" onclick="addEmoji('🔥')">🔥</span>
            <span class="emoji-btn" onclick="addEmoji('😢')">😢</span>
            <span class="emoji-btn" onclick="addEmoji('😠')">😠</span>
            <span class="emoji-btn" onclick="addEmoji('😯')">😯</span>
            <span class="emoji-btn" onclick="addEmoji('🫣')">🫣</span>
            <span class="emoji-btn" onclick="addEmoji('🥵')">🥵</span>
        </div>
        <div id="reply-bar" class="reply-container">
            <div class="reply-preview-msg" id="reply-text" style="font-size: 12px; color: #555;">Replying to...</div>
            <i class="fa fa-times" onclick="cancelReply()" style="cursor:pointer; font-size:14px;"></i>
        </div>
       <div class="input-footer">
    <label for="img-input"><i class="fa fa-image" style="font-size: 22px; cursor: pointer; color: var(--primary);"></i></label>
    
    <i class="fa fa-microphone" id="voice-btn" style="font-size: 22px; cursor: pointer; color: var(--primary);" onclick="toggleRecording()"></i>
    
    <input type="file" id="img-input" hidden multiple accept="image/*" onchange="sendImage(this)">
    
    <input type="text" id="msg-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()" style="background:none; border:none;"><i class="fa fa-paper-plane" style="font-size: 22px; color: var(--primary); cursor:pointer;"></i></button>
</div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpjHtL8bZktJYSEQvtUJvhMImAvaPoAjM",
        authDomain: "mychatapp-7a329.firebaseapp.com",
        databaseURL: "https://mychatapp-7a329-default-rtdb.firebaseio.com",
        projectId: "mychatapp-7a329",
        storageBucket: "mychatapp-7a329.firebasestorage.app",
        messagingSenderId: "489231530058",
        appId: "1:489231530058:web:d32580399444a8e62f0eb3"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let loggedUser = localStorage.getItem('chat_userid');
    let activeChatID = null;
    let replyingTo = null;
    const notifSound = new Audio('https://raw.githubusercontent.com/rafaelreis-hotmart/Audio-Notification/master/notification.mp3');

     window.onload = () => { 
    if(loggedUser) {
        loadMyData(); 
        showScreen('list-screen'); 
    } else {
        showScreen('login-screen'); 
    }
};

   function loadMyData() {
    database.ref('users/' + loggedUser).on('value', snap => {
        const d = snap.val();
        if(d) {
            document.getElementById('my-pic').src = d.pic;
            document.getElementById('edit-preview').src = d.pic;
            document.getElementById('edit-name').value = d.name;
           
        }
    });
}

    function togglePass(id, icon) {
        const inp = document.getElementById(id);
        const isPass = inp.type === "password";
        inp.type = isPass ? "text" : "password";
        icon.className = isPass ? "fa fa-eye eye-icon" : "fa fa-eye-slash eye-icon";
    }

    function previewImg(fId, iId) {
        const file = document.getElementById(fId).files[0];
        const reader = new FileReader();
        reader.onload = e => document.getElementById(iId).src = e.target.result;
        if(file) reader.readAsDataURL(file);
    }

    function handleRegister() {
        const id = document.getElementById('reg-id').value.trim().replace(/[.#$[\]]/g, "_");
        const user = document.getElementById('reg-user').value.trim();
        const name = document.getElementById('reg-name').value.trim();
        const pass = document.getElementById('reg-pass').value;
        const pic = document.getElementById('reg-preview').src;
        if(!id || !user || !pass) return alert("Fill all!");
        database.ref('users/' + id).set({ id, user, name, pass, pic }).then(() => { alert("Success!"); showScreen('login-screen'); });
    }

    function handleLogin() {
        const id = document.getElementById('log-id').value.trim().replace(/[.#$[\]]/g, "_");
        const pass = document.getElementById('log-pass').value;
        database.ref('users/' + id).once('value').then(snap => {
            if(snap.val() && snap.val().pass === pass) {
                loggedUser = id; localStorage.setItem('chat_userid', id); loadMyData();
            } else alert("Wrong ID or Password!");
        });
    }

    function getTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

    function openChat(pID, pData) {
        activeChatID = [loggedUser, pID].sort().join("_");
        document.getElementById('chat-partner-name').innerText = pData.name;
        document.getElementById('chat-partner-pic').src = pData.pic;
        showScreen('chat-screen');
        
        database.ref('chats/' + activeChatID).off();
        let firstLoad = true;

        database.ref('chats/' + activeChatID).on('value', snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            
            snap.forEach(c => {
                const m = c.val();
                const msgKey = c.key;

                if (m.sender !== loggedUser && m.status !== 'seen') {
                    database.ref('chats/' + activeChatID + '/' + msgKey).update({ status: 'seen' });
                }

                const d = document.createElement('div');
                d.className = `msg ${m.sender === loggedUser ? 'sent' : 'received'}`;
                
let pressTimer;


d.onmousedown = d.ontouchstart = (e) => {
    pressTimer = window.setTimeout(() => {
    
        const reaction = prompt("React with: ❤️, 👍, 😂, 🔥,😯,😢");
        if(reaction) {
            database.ref('chats/' + activeChatID + '/' + msgKey).update({ reaction: reaction });
        }
    }, 1000); 
};


d.onmouseup = d.ontouchend = () => {
    clearTimeout(pressTimer);
};


d.onclick = () => {

    setReply(m.type === 'image' ? 'Photo' : m.text, m.sender === loggedUser ? 'You' : pData.name);
};

                let content; 

if (m.type === 'image') {

    content = `<img src="${m.text}" class="chat-img" onclick="window.open(this.src)">`;
} 
else if (m.type === 'audio') {

    content = `<audio controls src="${m.text}"></audio>`;
} 
else {

    content = m.text;
}
                let time = m.time ? m.time : "";
                let statusIcon = "";
                if (m.sender === loggedUser) {
                    statusIcon = m.status === 'seen' ? `<i class="fa fa-check-double" style="color:#00ff00;"></i>` : `<i class="fa fa-check"></i>`;
                }

                let replyHtml = m.replyTo ? `<div class="msg-reply-line"><b>${m.replyTo.name}:</b> ${m.replyTo.text}</div>` : "";

                d.innerHTML = `${replyHtml} <div>${content}</div> <div class="msg-time">${time} ${statusIcon}</div>`;
                let reactHtml = m.reaction ? `<span class="reaction-badge">${m.reaction}</span>` : "";


d.innerHTML = `${replyHtml} <div>${content}</div> ${reactHtml} <div class="msg-time">${time} ${statusIcon}</div>`;
                if(m.type === 'image') d.style.background = "none";
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
            
            if(!firstLoad) {
                const msgs = Object.values(snap.val() || {});
                const lastMsg = msgs[msgs.length - 1];
                if(lastMsg && lastMsg.sender !== loggedUser) notifSound.play().catch(()=>{});
            }
            firstLoad = false;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        
        let msgData = {
            sender: loggedUser,
            text: inp.value,
            type: 'text',
            time: getTime(),
            status: 'sent'
        };

        if(replyingTo) {
            msgData.replyTo = replyingTo; 
            cancelReply();
        }

        database.ref('chats/' + activeChatID).push(msgData);
        inp.value = "";
        database.ref('users/' + loggedUser).update({ lastActive: Date.now() });
    }

    function setReply(text, senderName) {
        replyingTo = { text: text.substring(0, 30) + (text.length > 30 ? "..." : ""), name: senderName };
        document.getElementById('reply-bar').style.display = 'flex';
        document.getElementById('reply-text').innerText = `Replying to: ${replyingTo.text}`;
        document.getElementById('msg-input').focus();
    }

    function cancelReply() {
        replyingTo = null;
        document.getElementById('reply-bar').style.display = 'none';
    }

    function sendImage(input) {
    const files = Array.from(input.files).slice(0, 5);
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600; 
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
              
                const compressedData = canvas.toDataURL('image/jpeg', 0.7);

                database.ref('chats/' + activeChatID).push({ 
                    sender: loggedUser, 
                    text: compressedData, 
                    type: 'image', 
                    time: getTime(), 
                    status: 'sent' 
                });
            };
        };
        reader.readAsDataURL(file);
    });
    database.ref('users/' + loggedUser).update({ lastActive: Date.now() });
}

    function addEmoji(e) { const i = document.getElementById('msg-input'); i.value += e; i.focus(); }
   
    function renderList() {
    database.ref('users').once('value', snap => {
        const cont = document.getElementById('list-container'); 
        cont.innerHTML = "";
        
        let users = [];
        
        snap.forEach(c => {
            const u = c.val();
            if(u.id !== loggedUser) users.push(u);
        });

        
        users.sort((a, b) => (b.lastActive || 0) - (a.lastActive || 0));

       
        users.forEach(u => {
            const d = document.createElement('div'); 
            d.className = "chat-item";
            
            let pressTimer;
            d.onmousedown = d.ontouchstart = () => {
                pressTimer = setTimeout(() => {
                    if(confirm("Delete this chat?")) {
                        database.ref('chats/' + [loggedUser, u.id].sort().join("_")).remove();
                    }
                }, 1500); 
            };
            d.onmouseup = d.ontouchend = () => clearTimeout(pressTimer);

            d.onclick = () => openChat(u.id, u);
            d.innerHTML = `<img src="${u.pic}"><div><h4>${u.name}</h4><p>@${u.user || 'user'}</p></div>`;
            cont.appendChild(d);
        });
    });
}

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'list-screen') renderList();
    }

    function handleLogout() { localStorage.clear(); location.reload(); }
    function showEditProfile() { showScreen('edit-screen'); }
    
    function searchUser() {
        const term = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.chat-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(term) ? "flex" : "none";
        });
    }
    function saveProfile() {
    const n = document.getElementById('edit-name').value;
    const p = document.getElementById('edit-preview').src;
    const newPass = document.getElementById('edit-pass').value;
    
    let updateData = { name: n, pic: p };
    if(newPass) updateData.pass = newPass; 

    database.ref('users/' + loggedUser).update(updateData).then(() => { 
        alert("Updated!"); 
        showScreen('list-screen'); 
    });
}
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording() {
    const btn = document.getElementById('voice-btn');
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => {
                    sendVoiceMsg(reader.result);
                };
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            isRecording = true;
            btn.classList.add('recording-active');
        } catch (err) {
            alert("Microphone access denied!");
        }
    } else {
        mediaRecorder.stop();
        isRecording = false;
        btn.classList.remove('recording-active');
    }
}

function sendVoiceMsg(audioData) {
    database.ref('chats/' + activeChatID).push({
        sender: loggedUser,
        text: audioData,
        type: 'audio',
        time: getTime(),
        status: 'sent'
    });
    database.ref('users/' + loggedUser).update({ lastActive: Date.now() });
}
</script>
