<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Ultra Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(45deg, #00dbde 0%, #fc00ff 100%); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 420px; height: 92vh; background: var(--bg); border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .screen { padding: 30px; display: none; flex-direction: column; gap: 15px; height: 100%; justify-content: center; background: white; }
        .active { display: flex; }
        h2 { text-align: center; color: var(--primary); font-size: 28px; font-weight: 800; }
        .input-group { position: relative; width: 100%; }
        input { width: 100%; padding: 14px 20px; border: 2px solid #eee; border-radius: 15px; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .eye-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #0084ff; font-size: 18px; }
        .btn-main { padding: 15px; background: var(--primary); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .circle-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; }
        #list-screen { padding: 0; justify-content: flex-start; }
        .list-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: white; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 12px 20px; cursor: pointer; }
        .chat-item:hover { background: #f0f8ff; }
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 15px; word-wrap: break-word; display: flex; flex-direction: column; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; margin-top: 4px; opacity: 0.8; align-self: flex-end; display: flex; align-items: center; gap: 3px; }
        .received .msg-time { align-self: flex-start; color: #666; }
        .chat-img { max-width: 100%; border-radius: 10px; cursor: pointer; margin: 5px 0; }
        .emoji-bar { display: flex; gap: 12px; padding: 8px; background: white; border-top: 1px solid #f0f0f0; justify-content: center; font-size: 20px; }
        .emoji-btn { cursor: pointer; }
        .input-footer { padding: 15px; display: flex; gap: 10px; background: white; align-items: center; border-top: 1px solid #eee; }
        #msg-input { background: #f0f2f5; border: none; flex: 1; }
        .input-footer i { font-size: 22px; cursor: pointer; color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="register-screen" class="screen active">
        <h2>Create Account</h2>
        <div class="profile-upload">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="reg-preview" class="circle-img" onclick="document.getElementById('reg-file').click()">
            <input type="file" id="reg-file" hidden onchange="previewImg('reg-file', 'reg-preview')">
        </div>
        <input type="text" id="reg-id" placeholder="Phone Number">
        <input type="text" id="reg-user" placeholder="Username">
        <input type="text" id="reg-name" placeholder="Full Name">
        <div class="input-group">
            <input type="password" id="reg-pass" placeholder="Password">
            <i class="fa fa-eye-slash eye-icon" onclick="togglePass('reg-pass', this)"></i>
        </div>
        <button class="btn-main" onclick="handleRegister()">Sign Up</button>
        <p style="text-align:center; cursor:pointer;" onclick="showScreen('login-screen')">Log In</p>
    </div>

    <div id="login-screen" class="screen">
        <h2>Login</h2>
        <input type="text" id="log-id" placeholder="Phone Number">
        <div class="input-group">
            <input type="password" id="log-pass" placeholder="Password">
            <i class="fa fa-eye-slash eye-icon" onclick="togglePass('log-pass', this)"></i>
        </div>
        <button class="btn-main" onclick="handleLogin()">Log In</button>
        <p style="text-align:center; cursor:pointer;" onclick="showScreen('register-screen')">Create Account</p>
    </div>

    <div id="list-screen" class="screen">
        <div class="list-header">
            <h1 style="font-size: 22px;">Chats</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button onclick="handleLogout()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">Logout</button>
                <img id="my-pic" src="" style="width:40px; height:40px; border-radius:50%;" onclick="showEditProfile()">
            </div>
        </div>
        <div style="padding: 10px 20px;"><input type="text" id="search-input" placeholder="Search..." oninput="searchUser()"></div>
        <div id="list-container" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="edit-screen" class="screen">
        <h2>Edit Profile</h2>
        <div class="profile-upload">
            <img id="edit-preview" class="circle-img" onclick="document.getElementById('edit-file').click()">
            <input type="file" id="edit-file" hidden onchange="previewImg('edit-file', 'edit-preview')">
        </div>
        <input type="text" id="edit-name" placeholder="New Full Name">
        <button class="btn-main" onclick="saveProfile()">Save</button>
        <button class="btn-main" style="background:#ccc;" onclick="showScreen('list-screen')">Cancel</button>
    </div>

    <div id="chat-screen" class="screen" style="padding:0;">
        <div class="list-header">
            <i class="fa fa-chevron-left" onclick="showScreen('list-screen')" style="cursor:pointer; color: #0084ff;"></i>
            <h4 id="chat-partner-name">User</h4>
            <img id="chat-partner-pic" src="" style="width:35px; height:35px; border-radius:50%;">
        </div>
        <div class="messages-container" id="chat-box"></div>
        <div class="emoji-bar">
            <span class="emoji-btn" onclick="addEmoji('❤️')">❤️</span>
            <span class="emoji-btn" onclick="addEmoji('😘')">😘</span>
            <span class="emoji-btn" onclick="addEmoji('🥵')">🥵</span>
            <span class="emoji-btn" onclick="addEmoji('🔥')">🔥</span>
            <span class="emoji-btn" onclick="addEmoji('😢')">😢</span>
            <span class="emoji-btn" onclick="addEmoji('😠')">😠</span>
        </div>
        <div class="input-footer">
            <label for="img-input"><i class="fa fa-image"></i></label>
            <input type="file" id="img-input" hidden accept="image/*" onchange="sendImage(this)">
            <input type="text" id="msg-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:none; border:none;"><i class="fa fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpjHtL8bZktJYSEQvtUJvhMImAvaPoAjM",
        authDomain: "mychatapp-7a329.firebaseapp.com",
        databaseURL: "https://mychatapp-7a329-default-rtdb.firebaseio.com",
        projectId: "mychatapp-7a329",
        storageBucket: "mychatapp-7a329.firebasestorage.app",
        messagingSenderId: "489231530058",
        appId: "1:489231530058:web:d32580399444a8e62f0eb3"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let loggedUser = localStorage.getItem('chat_userid');
    let activeChatID = null;
    const notifSound = new Audio('https://raw.githubusercontent.com/rafaelreis-hotmart/Audio-Notification/master/notification.mp3');

    window.onload = () => { if(loggedUser) loadMyData(); else showScreen('login-screen'); };

    function loadMyData() {
        database.ref('users/' + loggedUser).on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('my-pic').src = d.pic;
                document.getElementById('edit-preview').src = d.pic;
                document.getElementById('edit-name').value = d.name;
                showScreen('list-screen');
            }
        });
    }

    function togglePass(id, icon) {
        const inp = document.getElementById(id);
        const isPass = inp.type === "password";
        inp.type = isPass ? "text" : "password";
        icon.className = isPass ? "fa fa-eye eye-icon" : "fa fa-eye-slash eye-icon";
    }

    function previewImg(fId, iId) {
        const file = document.getElementById(fId).files[0];
        const reader = new FileReader();
        reader.onload = e => document.getElementById(iId).src = e.target.result;
        if(file) reader.readAsDataURL(file);
    }

    function handleRegister() {
        const id = document.getElementById('reg-id').value.trim().replace(/[.#$[\]]/g, "_");
        const user = document.getElementById('reg-user').value.trim();
        const name = document.getElementById('reg-name').value.trim();
        const pass = document.getElementById('reg-pass').value;
        const pic = document.getElementById('reg-preview').src;
        if(!id || !user || !pass) return alert("Fill all!");
        database.ref('users/' + id).set({ id, user, name, pass, pic }).then(() => { alert("Success!"); showScreen('login-screen'); });
    }

    function handleLogin() {
        const id = document.getElementById('log-id').value.trim().replace(/[.#$[\]]/g, "_");
        const pass = document.getElementById('log-pass').value;
        database.ref('users/' + id).once('value').then(snap => {
            if(snap.val() && snap.val().pass === pass) {
                loggedUser = id; localStorage.setItem('chat_userid', id); loadMyData();
            } else alert("Wrong ID or Password!");
        });
    }

    function getTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

    function openChat(pID, pData) {
        activeChatID = [loggedUser, pID].sort().join("_");
        document.getElementById('chat-partner-name').innerText = pData.name;
        document.getElementById('chat-partner-pic').src = pData.pic;
        showScreen('chat-screen');
        
        database.ref('chats/' + activeChatID).off();
        let firstLoad = true;

        database.ref('chats/' + activeChatID).on('value', snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            
            snap.forEach(c => {
                const m = c.val();
                const msgKey = c.key;
                
                // Seen logic
                if (m.sender !== loggedUser && m.status !== 'seen') {
                    database.ref('chats/' + activeChatID + '/' + msgKey).update({ status: 'seen' });
                }

                const d = document.createElement('div');
                d.className = `msg ${m.sender === loggedUser ? 'sent' : 'received'}`;
                
                let content = m.type === 'image' ? `<img src="${m.text}" class="chat-img" onclick="window.open(this.src)">` : m.text;
                let time = m.time ? m.time : "";
                
                // Seen ticks
                let statusIcon = "";
                if (m.sender === loggedUser) {
                    statusIcon = m.status === 'seen' ? `<i class="fa fa-check-double" style="color:#00ff00;"></i>` : `<i class="fa fa-check"></i>`;
                }

                d.innerHTML = `${content} <div class="msg-time">${time} ${statusIcon}</div>`;
                if(m.type === 'image') d.style.background = "none";
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
            
            if(!firstLoad) {
                const msgs = Object.values(snap.val() || {});
                const lastMsg = msgs[msgs.length - 1];
                if(lastMsg && lastMsg.sender !== loggedUser) notifSound.play().catch(()=>{});
            }
            firstLoad = false;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        database.ref('chats/' + activeChatID).push({ 
            sender: loggedUser, text: inp.value, type: 'text', time: getTime(), status: 'sent' 
        });
        inp.value = "";
    }

    function sendImage(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            database.ref('chats/' + activeChatID).push({ 
                sender: loggedUser, text: e.target.result, type: 'image', time: getTime(), status: 'sent' 
            });
        };
        reader.readAsDataURL(file);
    }

    function addEmoji(e) { const i = document.getElementById('msg-input'); i.value += e; i.focus(); }
    
function renderList() {
    database.ref('users').once('value', snap => {
        const cont = document.getElementById('list-container'); 
        cont.innerHTML = "";
        let hasUsers = false;
        
        snap.forEach(c => {
            const u = c.val(); 
            if(u.id === loggedUser) return;
            hasUsers = true;
            const d = document.createElement('div'); 
            d.className = "chat-item";
            d.onclick = () => openChat(u.id, u);
            d.innerHTML = `<img src="${u.pic}"><div><h4>${u.name}</h4><p>@${u.user}</p></div>`;
            cont.appendChild(d);
        });

        if (!hasUsers) {
            cont.innerHTML = "<p style='text-align:center; padding:20px; color:#999;'>No users found!</p>";
        }
    });
}

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'list-screen') renderList();
    }
    function handleLogout() { localStorage.clear(); location.reload(); }
    function showEditProfile() { showScreen('edit-screen'); }
    function saveProfile() {
        const n = document.getElementById('edit-name').value;
        const p = document.getElementById('edit-preview').src;
        database.ref('users/' + loggedUser).update({ name: n, pic: p }).then(() => { alert("Updated!"); showScreen('list-screen'); });
    }
    function searchUser() {
        const term = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.chat-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(term) ? "flex" : "none";
        });
    }
</script>
</body>
</html>
