        .chat-item {
    display: flex;

}
.chat-item:hover {

}
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; }

}
.received {

        .msg-time { font-size: 10px; margin-top: 4px; opacity: 0.8; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }
        .received .msg-time { color: #888; justify-content: flex-start; }
        
        .msg-reply-line { font-size: 11px; background: rgba(0,0,0,0.05); padding: 6px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid var(--primary); opacity: 0.9; }

    background: white; 
    align-items: center;
    border-top: 1px solid #eee;
}

#msg-input { 
    background: #f0f2f5; 
    border: none; 
    flex: 1; 
    padding: 10px 20px; 
    border-radius: 25px;

    font-size: 15px;
}
        .reaction-badge {
    position: absolute;
    bottom: -10px;
    right: 10px;
    background: white;
    border-radius: 12px;
    padding: 2px 6px;
    font-size: 14px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    border: 1px solid #eee;
}
.emoji-bar {
    display: flex;
    justify-content: space-around;
    padding: 5px;
    background: #f9f9f9;
    border-top: 1px solid #eee;
}
.emoji-btn {
    cursor: pointer;
    font-size: 20px;
    transition: transform 0.2s;
}
.emoji-btn:hover { transform: scale(1.3); }
#edit-screen input {
    margin-bottom: 10px;
}
.chat-item {
    cursor: default;
}
audio {
    max-width: 100%;
    height: 40px;
    margin-top: 5px;
    border-radius: 20px;
}
.recording-active {
    color: #ff3b30 !important; 
    animation: pulse 1s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
.reaction-panel {
    display: none;
    position: absolute;
    top: -45px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 5px 10px;
    border-radius: 30px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    z-index: 1000;
    white-space: nowrap;
    animation: popUp 0.2s ease-out;
}
@keyframes popUp {
    from { opacity: 0; transform: translateX(-50%) scale(0.8); }
    to { opacity: 1; transform: translateX(-50%) scale(1); }
}
.reaction-panel span {
    cursor: pointer;
    font-size: 20px;
    margin: 0 3px;
    transition: transform 0.1s;
}
.reaction-panel span:hover { transform: scale(1.3); }
.msg { position: relative; }

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCpjHtL8bZktJYSEQvtUJvhMImAvaPoAjM",
        authDomain: "mychatapp-7a329.firebaseapp.com",
        databaseURL: "https://mychatapp-7a329-default-rtdb.firebaseio.com",
        projectId: "mychatapp-7a329",
        storageBucket: "mychatapp-7a329.firebasestorage.app",
        messagingSenderId: "489231530058",
        appId: "1:489231530058:web:d32580399444a8e62f0eb3"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let loggedUser = localStorage.getItem('chat_userid');
    let activeChatID = null;
    let replyingTo = null;
    const notifSound = new Audio('https://raw.githubusercontent.com/rafaelreis-hotmart/Audio-Notification/master/notification.mp3');
     window.onload = () => { 
    if(loggedUser) {
        loadMyData(); 
        showScreen('list-screen'); 
    } else {
        showScreen('login-screen'); 
    }
};
 function loadMyData() {
    if(!loggedUser) return;
    database.ref('users/' + loggedUser).once('value').then(snap => {
        const d = snap.val();
        if(d) {
            document.getElementById('my-pic').src = d.pic || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('edit-preview').src = d.pic || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('edit-name').value = d.name || "";
        }
    });
}
    function togglePass(id, icon) {
        const inp = document.getElementById(id);
        const isPass = inp.type === "password";
        inp.type = isPass ? "text" : "password";
        icon.className = isPass ? "fa fa-eye eye-icon" : "fa fa-eye-slash eye-icon";
    }
    function previewImg(fId, iId) {
        const file = document.getElementById(fId).files[0];
        const reader = new FileReader();
        reader.onload = e => document.getElementById(iId).src = e.target.result;
        if(file) reader.readAsDataURL(file);
    }
  
function resetPassword() {
    const email = prompt("Enter your Gmail address:");
    if (email) {
        firebase.auth().sendPasswordResetEmail(email)
        .then(() => {
            alert("Password reset email sent!");
        })
        .catch((error) => {
            alert(error.message);
        });
    }
}
  function handleLogin() {
    const id = document.getElementById("log-id").value.trim();
    const pass = document.getElementById("log-pass").value;

    if(!id || !pass){
        alert("Please enter Email/Phone and Password");
        return;
    }

    const loginBtn = document.querySelector("#login-screen .btn-main");
    const originalText = loginBtn.innerText;
    loginBtn.innerText = "Logging in...";
    loginBtn.disabled = true;

    if(id.includes("@")) {
        firebase.auth().signInWithEmailAndPassword(id, pass)
        .then((userCredential) => {
            loggedUser = userCredential.user.uid;
            localStorage.setItem("chat_userid", loggedUser);
            loadMyData();
            showScreen("list-screen");
        })
        .catch(error => {
            alert(error.message);
        })
        .finally(() => {
            loginBtn.innerText = originalText;
            loginBtn.disabled = false;
        });
    } else {
        // Phone number login using custom database
        database.ref('users/' + id).once('value').then(snap => {
            const userData = snap.val();
            if(userData && userData.pass === pass){
                loggedUser = id;
                localStorage.setItem("chat_userid", id);
                loadMyData();
                showScreen("list-screen");
            } else {
                alert("Wrong Phone Number or Password!");
            }
        }).finally(()=>{
            loginBtn.innerText = originalText;
            loginBtn.disabled = false;
        });
    }
}
window.handleLogin = handleLogin;

    function getTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
   function openChat(pID, pData) {
    activeChatID = [loggedUser, pID].sort().join("_");
    document.getElementById('chat-partner-name').innerText = pData.name;
    document.getElementById('chat-partner-pic').src = pData.pic;
    showScreen('chat-screen');
     
    const activeChatPartnerID = pID;           
    const currentPartnerName = pData.name;
database.ref('recording/' + activeChatID).on('value', snap => {
    const recUsers = snap.val() || {};
    const partnerIsRecording = recUsers[activeChatPartnerID]; 
    document.getElementById('chat-partner-name').innerText = partnerIsRecording ? 'Recording...' : currentPartnerName;
});

    database.ref('typing/' + activeChatID).on('value', snap => {
    const typingUsers = snap.val() || {};
    let partnerTyping = Object.keys(typingUsers).filter(u => u !== loggedUser);
    const nameDiv = document.getElementById('chat-partner-name');
    nameDiv.innerText = partnerTyping.length > 0 ? 'Typing...' : currentPartnerName;
    });
    
    const box = document.getElementById('chat-box');
    box.innerHTML = ""; 
    
    database.ref('chats/' + activeChatID).off(); 
    let initialDataLoaded = false;

    const chatRef = database.ref('chats/' + activeChatID);
    chatRef.limitToLast(50).on('child_added', snap => {
        const m = snap.val();
        const msgKey = snap.key;

        if (m.sender !== loggedUser && m.status !== 'seen') {
            chatRef.child(msgKey).update({ status: 'seen' });
        }

        renderSingleMessage(msgKey, m, pData);
        box.scrollTop = box.scrollHeight;

        if (initialDataLoaded && m.sender !== loggedUser) {
            notifSound.play().catch(() => {});
        }
    });

    chatRef.once('value', () => { initialDataLoaded = true; });
    chatRef.on('child_changed', snap => {
        const updatedMsg = snap.val();
        const msgElement = document.getElementById(`msg-${snap.key}`);
        if (msgElement) {
            let badge = msgElement.querySelector('.reaction-badge');
            if (updatedMsg.reaction) {
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'reaction-badge';
                    msgElement.appendChild(badge);
                }
                badge.innerText = updatedMsg.reaction;
            }
            if (updatedMsg.sender === loggedUser) {
                const timeDiv = msgElement.querySelector('.msg-time');
                const statusIcon = updatedMsg.status === 'seen' ? 
                    `<i class="fa fa-check-double" style="color:#00ff00;"></i>` : `<i class="fa fa-check"></i>`;
                timeDiv.innerHTML = `${updatedMsg.time} ${statusIcon}`;
            }
        }
    });
}
     function renderSingleMessage(msgKey, m, pData) {
    const box = document.getElementById('chat-box');
    const d = document.createElement('div');
    d.id = `msg-${msgKey}`; 
    d.className = `msg ${m.sender === loggedUser ? 'sent' : 'received'}`;
    
    let content;
    if (m.type === 'image') {
        content = `<img src="${m.text}" class="chat-img" onclick="window.open(this.src)">`;
        d.style.background = "none";
    } else if (m.type === 'audio') {
        content = `<audio controls src="${m.text}"></audio>`;
    } else {
        content = m.text;
    }
    let statusIcon = "";
    if (m.sender === loggedUser) {
        statusIcon = m.status === 'seen' ? `<i class="fa fa-check-double" style="color:#00ff00;"></i>` : `<i class="fa fa-check"></i>`;
    }
    let replyHtml = m.replyTo ? `<div class="msg-reply-line"><b>${m.replyTo.name}:</b> ${m.replyTo.text}</div>` : "";
    let reactBadge = m.reaction ? `<span class="reaction-badge">${m.reaction}</span>` : "";

    let reactionPanel = `
        <div class="reaction-panel" id="panel-${msgKey}">
            <span onclick="addReaction('${msgKey}', '❤️')">❤️</span>
            <span onclick="addReaction('${msgKey}', '👍')">👍</span>
            <span onclick="addReaction('${msgKey}', '😂')">😂</span>
            <span onclick="addReaction('${msgKey}', '😮')">😮</span>
            <span onclick="addReaction('${msgKey}', '😢')">😢</span>
            <span onclick="addReaction('${msgKey}', '🔥')">🔥</span>
        </div>`;
    d.innerHTML = `
        ${reactionPanel}
        ${replyHtml}
        <div>${content}</div>
        ${reactBadge}
        <div class="msg-time">${m.time || ""} ${statusIcon}</div>
    `;
    let timer;
    const showPanel = () => {
        timer = setTimeout(() => {
            document.getElementById(`panel-${msgKey}`).style.display = 'flex';
        }, 600);
    };
    const clearTimer = () => clearTimeout(timer);

    d.addEventListener('touchstart', showPanel);

    function sendImage(input) {
    const files = Array.from(input.files).slice(0, 5);
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600; 
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const compressedData = canvas.toDataURL('image/jpeg', 0.5); 
                database.ref('chats/' + activeChatID).push({ 
                    sender: loggedUser, 
                    text: compressedData, 
                    type: 'image', 
                    time: getTime(), 
                    status: 'sent' 
                });
            };
        };
        reader.readAsDataURL(file);
    });
    database.ref('users/' + loggedUser).update({ lastActive: Date.now() });
    }

let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording() {
    const btn = document.getElementById('voice-btn');
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => {
                    sendVoiceMsg(reader.result);
                };
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            isRecording = true;
           
            btn.classList.add('recording-active');

            if (activeChatID) {
                database.ref('recording/' + activeChatID + '/' + loggedUser).set(true);
            }

        } catch (err) {
            alert("Microphone access denied!");
        }
    } else {
        mediaRecorder.stop();
        isRecording = false;

        btn.classList.remove('recording-active');

        if (activeChatID) {
            database.ref('recording/' + activeChatID + '/' + loggedUser).remove();
        }
    }
}
function sendVoiceMsg(audioData) {
    database.ref('chats/' + activeChatID).push({

        text: audioData,
        type: 'audio',
        time: getTime(),

    });
    database.ref('users/' + loggedUser).update({ lastActive: Date.now() });
}
